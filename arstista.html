<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOULRADE - Artista</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #181821;
            --bg2: #0e0e1a;
            --bg3: #06060c;
            --card: #12121e;
            --border: #2e2e40;
            --purple: #8c52ff;
            --pink: #e757ff;
            --text: #ffffff;
            --muted: #aaaaaa;
            --header: #06060c;
        }
        [data-theme="light"] {
            --bg: #f0eef7;
            --bg2: #faf8ff;
            --bg3: #ede8f8;
            --card: #ffffff;
            --border: #d4c5f7;
            --text: #1a0a3d;
            --muted: #6b5a8a;
            --header: #0b0615;
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.3px;
            padding-top: 65px;
        }

        /* ── HEADER (igual que index.html) ── */
        header {
            background-color: var(--header);
            padding: 0.85rem 1.5rem;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 1000;
            box-shadow: 0 6px 8px #3e3e3e;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }
        .logo-texto {
            font-family: "MedievalSharp", cursive;
            font-size: 28px;
            background: linear-gradient(90deg, #e757ff, #8c52ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
        }
        .nav-search {
            flex: 1;
            max-width: 420px;
            display: flex;
        }
        .nav-search input {
            width: 100%;
            height: 34px;
            padding: 0 12px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--bg2);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }
        .nav-search input:focus { border-color: var(--purple); }
        .nav-back {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 0.4rem 1rem;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .nav-back:hover { color: var(--pink); border-color: var(--pink); }

        /* ── LOADING / ERROR ── */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 1rem;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--purple);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--muted); font-size: 0.9rem; }

        /* ── HERO ── */
        .artist-hero {
            position: relative;
            min-height: 380px;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
        }
        .hero-bg {
            position: absolute; inset: 0;
            background-size: cover;
            background-position: center top;
            filter: blur(18px) brightness(0.35);
            transform: scale(1.08);
        }
        .hero-gradient {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 30%, var(--bg) 100%);
        }
        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: flex-end;
            gap: 2rem;
            padding: 2.5rem 2rem 2rem;
            width: 100%;
        }
        .artist-avatar {
            width: 160px;
            height: 160px;
            border-radius: 12px;
            object-fit: cover;
            border: 3px solid var(--purple);
            box-shadow: 0 0 32px rgba(140,82,255,0.4);
            flex-shrink: 0;
        }
        .artist-avatar-placeholder {
            width: 160px;
            height: 160px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            flex-shrink: 0;
            border: 3px solid var(--purple);
        }
        .hero-info { flex: 1; min-width: 0; }
        .artist-type {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--purple);
            margin-bottom: 0.25rem;
        }
        .artist-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            line-height: 1;
            margin: 0 0 0.5rem;
            color: var(--text);
        }
        .artist-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 0.75rem;
        }
        .tag {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            background: rgba(140,82,255,0.15);
            border: 1px solid rgba(140,82,255,0.3);
            color: var(--purple);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .artist-stats {
            display: flex;
            gap: 2rem;
            margin-bottom: 0.75rem;
        }
        .stat { text-align: center; }
        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.5rem;
            color: var(--pink);
            line-height: 1;
        }
        .stat-label {
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hero-bio {
            font-size: 0.85rem;
            color: var(--muted);
            line-height: 1.6;
            max-width: 600px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── SECCIONES ── */
        .section {
            padding: 2rem 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }
        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 2px;
            color: var(--text);
            margin: 0;
        }
        .section-title span {
            color: var(--purple);
        }
        .ver-mas {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--purple);
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }
        .ver-mas:hover { color: var(--pink); }

        /* ── SCROLL HORIZONTAL ── */
        .scroll-row {
            display: flex;
            gap: 1rem;
            overflow-x: auto;
            padding-bottom: 0.75rem;
            scrollbar-width: thin;
            scrollbar-color: var(--purple) transparent;
        }
        .scroll-row::-webkit-scrollbar { height: 4px; }
        .scroll-row::-webkit-scrollbar-track { background: transparent; }
        .scroll-row::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 2px; }

        /* ── CARD ALBUM ── */
        .album-card {
            flex-shrink: 0;
            width: 150px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .album-card:hover { transform: translateY(-4px); }
        .album-cover {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            object-fit: cover;
            background: var(--card);
            border: 1px solid var(--border);
            display: block;
        }
        .album-cover-placeholder {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--bg2), var(--card));
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }
        .album-name {
            font-size: 0.82rem;
            font-weight: 600;
            margin-top: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .album-year {
            font-size: 0.72rem;
            color: var(--muted);
        }

        /* ── CARD CANCION ── */
        .track-card {
            flex-shrink: 0;
            width: 160px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .track-card:hover { transform: translateY(-4px); }
        .track-cover {
            width: 160px;
            height: 120px;
            border-radius: 10px;
            object-fit: cover;
            background: var(--card);
            border: 1px solid var(--border);
            display: block;
            position: relative;
        }
        .track-cover-placeholder {
            width: 160px;
            height: 120px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--purple)33, var(--pink)22);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .track-name {
            font-size: 0.82rem;
            font-weight: 600;
            margin-top: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text);
        }
        .track-plays {
            font-size: 0.72rem;
            color: var(--muted);
        }
        .play-count-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.68rem;
            color: var(--muted);
        }

        /* ── CARD ARTISTA SIMILAR ── */
        .similar-card {
            flex-shrink: 0;
            width: 130px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .similar-card:hover { transform: translateY(-4px); }
        .similar-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
            transition: border-color 0.2s;
            margin: 0 auto;
            display: block;
        }
        .similar-card:hover .similar-img { border-color: var(--purple); }
        .similar-img-placeholder {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--purple), var(--pink));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto;
            border: 2px solid var(--border);
        }
        .similar-name {
            font-size: 0.78rem;
            font-weight: 600;
            margin-top: 0.5rem;
            color: var(--text);
        }

        /* ── BIO COMPLETA ── */
        .bio-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin: 0 2rem 2rem;
            max-width: 1156px;
            margin-left: auto;
            margin-right: auto;
        }
        .bio-text {
            font-size: 0.88rem;
            line-height: 1.75;
            color: var(--muted);
            max-height: 140px;
            overflow: hidden;
            transition: max-height 0.4s ease;
        }
        .bio-text.expanded { max-height: 1000px; }
        .bio-toggle {
            background: transparent;
            border: none;
            color: var(--purple);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.5rem 0 0;
            transition: color 0.2s;
        }
        .bio-toggle:hover { color: var(--pink); }

        /* ── DIVIDER ── */
        .section-divider {
            height: 1px;
            background: var(--border);
            margin: 0.5rem 2rem;
            max-width: 1156px;
            margin-left: auto;
            margin-right: auto;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            .hero-content { flex-direction: column; align-items: flex-start; gap: 1rem; padding: 1.5rem 1rem 1.5rem; }
            .artist-avatar, .artist-avatar-placeholder { width: 120px; height: 120px; }
            .section { padding: 1.5rem 1rem 1rem; }
            .bio-section { margin: 0 1rem 1.5rem; }
            .artist-stats { gap: 1rem; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <nav>
        <a href="index.html" class="logo">
            <span class="logo-texto">-</span><span class="logo-texto">SOULRADE</span>
        </a>
        <div class="nav-search">
            <input type="search" id="navSearch" placeholder="Buscar artista..." aria-label="Buscar">
        </div>
        <a href="index.html" class="nav-back">
            ← Inicio
        </a>
    </nav>
</header>

<!-- CONTENIDO PRINCIPAL -->
<main id="mainContent">
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <p class="loading-text">Cargando artista...</p>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
//  SOULRADE — artista.html script
//  Spotify → imágenes | Last.fm → datos | MusicBrainz → discografía
// ═══════════════════════════════════════════════════════════

const LASTFM_KEY            = "575c583beb1193710327f12896a85ad5";
const LASTFM_BASE           = "https://ws.audioscrobbler.com/2.0/";
const SPOTIFY_CLIENT_ID     = "2d126d716b984f7a8f6360e8bc46344b";
const SPOTIFY_CLIENT_SECRET = "63ec833b066849c6972c510e8f52d7f9";
const MB_BASE               = "https://musicbrainz.org/ws/2/";
const MB_HEADERS            = { headers: { "User-Agent": "Soulrade/1.0 (soulrade@email.com)" } };

// ── Token Spotify (auto-renovable) ──────────────────────────
let _spToken = null, _spExp = 0;
async function getSpotifyToken() {
    if (_spToken && Date.now() < _spExp) return _spToken;
    const r = await fetch("https://accounts.spotify.com/api/token", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: `grant_type=client_credentials&client_id=${SPOTIFY_CLIENT_ID}&client_secret=${SPOTIFY_CLIENT_SECRET}`
    });
    const d = await r.json();
    _spToken = d.access_token;
    _spExp   = Date.now() + (d.expires_in - 60) * 1000;
    return _spToken;
}
async function sp(endpoint) {
    const token = await getSpotifyToken();
    const r = await fetch(`https://api.spotify.com/v1${endpoint}`, {
        headers: { Authorization: `Bearer ${token}` }
    });
    return r.ok ? r.json() : null;
}

// ── Imágenes desde Spotify ───────────────────────────────────
async function getArtistImage(name) {
    try {
        const d = await sp(`/search?q=${encodeURIComponent(name)}&type=artist&limit=1`);
        return d?.artists?.items?.[0]?.images?.[0]?.url || null;
    } catch { return null; }
}
async function getTrackImage(artistName, trackName) {
    try {
        const q = encodeURIComponent(`track:${trackName} artist:${artistName}`);
        const d = await sp(`/search?q=${q}&type=track&limit=1`);
        return d?.tracks?.items?.[0]?.album?.images?.[0]?.url || null;
    } catch { return null; }
}
async function getAlbumImageSpotify(artistName, albumName) {
    try {
        const q = encodeURIComponent(`album:${albumName} artist:${artistName}`);
        const d = await sp(`/search?q=${q}&type=album&limit=1`);
        return d?.albums?.items?.[0]?.images?.[0]?.url || null;
    } catch { return null; }
}

// ── Last.fm ──────────────────────────────────────────────────
async function lastfm(params) {
    const url = new URL(LASTFM_BASE);
    Object.entries({ ...params, api_key: LASTFM_KEY, format: "json" })
          .forEach(([k,v]) => url.searchParams.set(k, v));
    const r = await fetch(url);
    return r.json();
}
async function getArtistInfo(name)      { return lastfm({ method: "artist.getinfo",      artist: name, autocorrect: 1 }); }
async function getTopTracks(name)       { return lastfm({ method: "artist.gettoptracks", artist: name, limit: 10, autocorrect: 1 }); }
async function getSimilarArtists(name)  { return lastfm({ method: "artist.getsimilar",   artist: name, limit: 8,  autocorrect: 1 }); }

// ── MusicBrainz ──────────────────────────────────────────────
async function getAlbums(mbid) {
    if (!mbid) return null;
    try {
        const r = await fetch(`${MB_BASE}release-group/?artist=${mbid}&type=album&limit=20&fmt=json`, MB_HEADERS);
        return r.ok ? r.json() : null;
    } catch { return null; }
}

// ── Helpers ──────────────────────────────────────────────────
function formatNumber(n) {
    if (!n) return "0";
    const num = parseInt(n);
    if (num >= 1_000_000) return (num / 1_000_000).toFixed(1) + "M";
    if (num >= 1_000)     return (num / 1_000).toFixed(0) + "K";
    return num.toString();
}
function cleanBio(bio) {
    if (!bio) return "";
    return bio.replace(/<a [^>]+>.*?<\/a>/gi, "").replace(/\s+Read more on Last\.fm\.?/gi, "").replace(/<[^>]+>/g, "").trim();
}

// ═══════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════

function renderArtist(artistData, tracks, similar, albums, artistImg) {
    const artist   = artistData.artist;
    const bioFull  = cleanBio(artist.bio?.content  || "");
    const bioShort = cleanBio(artist.bio?.summary  || "");
    const tags     = artist.tags?.tag?.slice(0, 5) || [];
    const listeners = formatNumber(artist.stats?.listeners);
    const playcount = formatNumber(artist.stats?.playcount);

    // Hero
    const heroHTML = `
        <div class="artist-hero">
            ${artistImg ? `<div class="hero-bg" style="background-image:url(\'${artistImg}\')"></div>` : ""}
            <div class="hero-gradient"></div>
            <div class="hero-content">
                ${artistImg
                    ? `<img src="${artistImg}" class="artist-avatar" alt="${artist.name}" onerror="this.outerHTML=\'<div class=\\\'artist-avatar-placeholder\\\'>🎵</div>\'">` 
                    : `<div class="artist-avatar-placeholder">🎵</div>`}
                <div class="hero-info">
                    <p class="artist-type">ARTISTA</p>
                    <h1 class="artist-name">${artist.name}</h1>
                    ${tags.length ? `<div class="artist-tags">${tags.map(t => `<span class="tag">${t.name}</span>`).join("")}</div>` : ""}
                    <div class="artist-stats">
                        <div class="stat"><div class="stat-value">${listeners}</div><div class="stat-label">Oyentes</div></div>
                        <div class="stat"><div class="stat-value">${playcount}</div><div class="stat-label">Reproducciones</div></div>
                    </div>
                    ${bioShort ? `<p class="hero-bio">${bioShort}</p>` : ""}
                </div>
            </div>
        </div>`;

    // Bio
    const bioHTML = bioFull ? `
        <div class="bio-section">
            <div class="bio-text" id="bioText">${bioFull}</div>
            <button class="bio-toggle" id="bioToggle" onclick="toggleBio()">Leer más ↓</button>
        </div>
        <div class="section-divider"></div>` : "";

    // Top Tracks — placeholders primero, imágenes cargan después
    const topTracks = tracks?.toptracks?.track || [];
    const tracksHTML = topTracks.length ? `
        <div class="section">
            <div class="section-header"><h2 class="section-title">TOP <span>CANCIONES</span></h2></div>
            <div class="scroll-row" id="tracksRow">
                ${topTracks.map((track, i) => `
                    <div class="track-card" id="track-${i}" onclick="window.open(\'${track.url}\', \'_blank\')">
                        <div class="track-cover-placeholder" id="timg-${i}">🎵</div>
                        <div class="track-name" title="${track.name}">${track.name}</div>
                        <div class="track-plays"><span class="play-count-badge">▶ ${formatNumber(track.playcount)} rep.</span></div>
                    </div>`).join("")}
            </div>
        </div>
        <div class="section-divider"></div>` : "";

    // Álbumes — placeholders, imágenes cargan después
    const albumList = albums?.["release-groups"] || [];
    const albumsHTML = albumList.length ? `
        <div class="section">
            <div class="section-header"><h2 class="section-title">DIS<span>COGRAFÍA</span></h2></div>
            <div class="scroll-row" id="albumsRow">
                ${albumList.slice(0, 20).map((album, i) => `
                    <div class="album-card" id="album-${i}">
                        <div class="album-cover-placeholder" id="aimg-${i}">💿</div>
                        <div class="album-name" title="${album.title}">${album.title}</div>
                        <div class="album-year">${album["first-release-date"]?.slice(0,4) || ""}</div>
                    </div>`).join("")}
            </div>
        </div>
        <div class="section-divider"></div>` : "";

    // Artistas similares — placeholders, imágenes cargan después
    const similarList = similar?.similarartists?.artist || [];
    const similarHTML = similarList.length ? `
        <div class="section">
            <div class="section-header"><h2 class="section-title">ARTISTAS <span>SIMILARES</span></h2></div>
            <div class="scroll-row" id="similarRow">
                ${similarList.map((sim, i) => `
                    <div class="similar-card" id="sim-${i}" onclick="loadArtist(\'${sim.name.replace(/\'/g, "\\'")}\')">
                        <div class="similar-img-placeholder" id="simg-${i}">🎤</div>
                        <div class="similar-name">${sim.name}</div>
                    </div>`).join("")}
            </div>
        </div>` : "";

    document.getElementById("mainContent").innerHTML =
        heroHTML + bioHTML + tracksHTML + albumsHTML + similarHTML;

    // ── Cargar imágenes en segundo plano (no bloquean el render) ──

    // Canciones
    topTracks.forEach(async (track, i) => {
        const url = await getTrackImage(artist.name, track.name);
        const el  = document.getElementById(`timg-${i}`);
        if (el && url) el.outerHTML = `<img src="${url}" class="track-cover" alt="${track.name}" onerror="this.outerHTML=\'<div class=\\\'track-cover-placeholder\\\'>🎵</div>\'">`;
    });

    // Álbumes
    albumList.slice(0, 20).forEach(async (album, i) => {
        const url = await getAlbumImageSpotify(artist.name, album.title);
        const el  = document.getElementById(`aimg-${i}`);
        if (el && url) el.outerHTML = `<img src="${url}" class="album-cover" alt="${album.title}" onerror="this.outerHTML=\'<div class=\\\'album-cover-placeholder\\\'>💿</div>\'">`;
    });

    // Artistas similares
    similarList.forEach(async (sim, i) => {
        const url = await getArtistImage(sim.name);
        const el  = document.getElementById(`simg-${i}`);
        if (el && url) el.outerHTML = `<img src="${url}" class="similar-img" alt="${sim.name}" onerror="this.outerHTML=\'<div class=\\\'similar-img-placeholder\\\'>🎤</div>\'">`;
    });
}

// ═══════════════════════════════════════════════════════════
//  CARGAR ARTISTA
// ═══════════════════════════════════════════════════════════

async function loadArtist(name) {
    document.getElementById("mainContent").innerHTML = `
        <div class="loading-screen">
            <div class="spinner"></div>
            <p class="loading-text">Cargando ${name}...</p>
        </div>`;
    try {
        const [artistData, tracks, similar] = await Promise.all([
            getArtistInfo(name), getTopTracks(name), getSimilarArtists(name)
        ]);
        if (artistData.error || !artistData.artist) {
            showError(`No se encontró el artista "${name}"`); return;
        }
        const mbid = artistData.artist.mbid;
        const [albums, artistImg] = await Promise.all([
            getAlbums(mbid),
            getArtistImage(artistData.artist.name)
        ]);
        document.title = `SOULRADE - ${artistData.artist.name}`;
        history.pushState({}, "", `?artista=${encodeURIComponent(artistData.artist.name)}`);
        renderArtist(artistData, tracks, similar, albums, artistImg);
    } catch (err) {
        showError("Error al cargar el artista. Verificá tu conexión.");
        console.error(err);
    }
}

function showError  (msg) {
    document.getElementById("mainContent").innerHTML = `
        <div class="loading-screen">
            <p style="font-size:3rem">😕</p>
            <p style="color:var(--muted)">${msg}</p>
            <button onclick="history.back()" class="nav-back" style="margin-top:1rem">← Volver</button>
        </div>`;
}

function toggleBio() {
    const bio = document.getElementById("bioText");
    const btn = document.getElementById("bioToggle");
    bio.classList.toggle("expanded")
        ? btn.textContent = "Leer menos ↑"
        : btn.textContent = "Leer más ↓";
}

document.getElementById("navSearch").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && this.value.trim()) {
        loadArtist(this.value.trim());
        this.value = "";
    }
});

const params = new URLSearchParams(location.search);
loadArtist(params.get("artista") || "Lady Gaga");
</script>
